<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Email Spoofing Detector</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .hero {
    max-width: 560px;
    width: 100%;
    text-align: center;
  }

  .shield {
    font-size: 4em;
    margin-bottom: 16px;
    filter: drop-shadow(0 0 24px #4f8ef7aa);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 24px #4f8ef7aa); }
    50%       { filter: drop-shadow(0 0 40px #4f8ef7ff); }
  }

  h1 { font-size: 1.9em; font-weight: 800; color: #fff; margin-bottom: 8px; }
  .subtitle { color: #888; font-size: 0.95em; margin-bottom: 36px; line-height: 1.6; }

  .upload-card {
    background: #1a1d27;
    border: 2px dashed #2e3348;
    border-radius: 16px;
    padding: 40px 32px;
    transition: border-color .2s, background .2s;
    cursor: pointer;
    position: relative;
  }
  .upload-card:hover, .upload-card.drag-over {
    border-color: #4f8ef7;
    background: #1e2235;
  }

  .upload-card input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .upload-icon { font-size: 2.5em; margin-bottom: 12px; }
  .upload-label { font-size: 1em; color: #aaa; }
  .upload-label strong { color: #4f8ef7; }
  .file-hint { font-size: 0.8em; color: #555; margin-top: 8px; }

  .filename-display {
    margin-top: 16px;
    padding: 10px 16px;
    background: #0f1117;
    border-radius: 8px;
    font-size: 0.88em;
    color: #4f8ef7;
    display: none;
    word-break: break-all;
  }

  /* Paste area */
  .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; color: #444; font-size: 0.85em; }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background:#2e3348; }

  textarea {
    width: 100%;
    background: #1a1d27;
    border: 2px solid #2e3348;
    border-radius: 12px;
    color: #ccc;
    font-family: 'Courier New', monospace;
    font-size: 0.8em;
    padding: 14px;
    resize: vertical;
    min-height: 120px;
    outline: none;
    transition: border-color .2s;
  }
  textarea:focus { border-color: #4f8ef7; }
  textarea::placeholder { color: #444; }

  .btn {
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #4f8ef7, #7b5ea7);
    color: #fff;
    font-size: 1em;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: .5px;
    transition: opacity .2s, transform .1s;
  }
  .btn:hover { opacity: .9; }
  .btn:active { transform: scale(.98); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .spinner { display: none; margin: 20px auto 0; width: 32px; height: 32px;
    border: 3px solid #2e3348; border-top-color: #4f8ef7;
    border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .samples { margin-top: 28px; }
  .samples p { color: #555; font-size: 0.82em; margin-bottom: 10px; }
  .sample-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .sample-btn {
    padding: 6px 16px; border-radius: 20px; border: 1px solid #2e3348;
    background: transparent; color: #888; font-size: 0.82em; cursor: pointer;
    transition: all .2s;
  }
  .sample-btn:hover { border-color: #4f8ef7; color: #4f8ef7; }

  .error { margin-top: 16px; padding: 12px 16px; background: #2a1a1a;
    border: 1px solid #7a1a1a; border-radius: 8px; color: #f88; font-size: 0.88em; }
</style>
</head>
<body>
<div class="hero">
  <div class="shield">🛡️</div>
  <h1>Email Spoofing Detector</h1>
  <p class="subtitle">
    Upload a <code>.eml</code> file or paste raw email headers.<br>
    We check SPF, DKIM, DMARC and give a trust score.
  </p>

  <form method="POST" action="/analyse" enctype="multipart/form-data" id="mainForm">

    <div class="upload-card" id="dropZone">
      <input type="file" name="eml_file" accept=".eml,.txt" id="fileInput">
      <div class="upload-icon">📂</div>
      <div class="upload-label">Drop your <strong>.eml file</strong> here<br>or click to browse</div>
      <div class="file-hint">Exported from Gmail · Outlook · Thunderbird</div>
      <div class="filename-display" id="filenameDisplay"></div>
    </div>

    <!-- <div class="divider">or paste raw headers</div> -->

    <textarea name="raw_headers" id="rawHeaders"
      placeholder="Paste email headers here...
From: ...
To: ...
Received: ...
DKIM-Signature: ..."></textarea>

    <button class="btn" type="submit" id="submitBtn"> Analyse Email</button>
    <div class="spinner" id="spinner"></div>

    {% if error %}
    <div class="error"> {{ error }}</div>
    {% endif %}
  </form>

  <div class="samples">
    <p>Try a sample:</p>
    <div class="sample-btns">
      <form method="POST" action="/sample/legitimate" style="display:inline">
        <button class="sample-btn" type="submit"> Legitimate Email</button>
      </form>
      <form method="POST" action="/sample/spoofed" style="display:inline">
        <button class="sample-btn" type="submit"> Spoofed Email</button>
      </form>
      <form method="POST" action="/sample/partial_auth.eml" style="display:inline">
        <button class="sample-btn" type="submit"> Spoofed Email</button>
      </form>
    </div>
  </div>
</div>

<script>
  const dropZone   = document.getElementById('dropZone');
  const fileInput  = document.getElementById('fileInput');
  const fileDisp   = document.getElementById('filenameDisplay');
  const submitBtn  = document.getElementById('submitBtn');
  const spinner    = document.getElementById('spinner');
  const form       = document.getElementById('mainForm');

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) {
      fileDisp.textContent = ' ' + fileInput.files[0].name;
      fileDisp.style.display = 'block';
    }
  });

  ['dragover','dragenter'].forEach(e => dropZone.addEventListener(e, ev => {
    ev.preventDefault(); dropZone.classList.add('drag-over');
  }));
  ['dragleave','drop'].forEach(e => dropZone.addEventListener(e, ev => {
    dropZone.classList.remove('drag-over');
  }));
  dropZone.addEventListener('drop', ev => {
    ev.preventDefault();
    const file = ev.dataTransfer.files[0];
    if (file) {
      const dt = new DataTransfer(); dt.items.add(file);
      fileInput.files = dt.files;
      fileDisp.textContent = ' ' + file.name;
      fileDisp.style.display = 'block';
    }
  });

  form.addEventListener('submit', () => {
    submitBtn.disabled = true;
    submitBtn.textContent = 'Analysing…';
    spinner.style.display = 'block';
  });
</script>
</body>
</html>
